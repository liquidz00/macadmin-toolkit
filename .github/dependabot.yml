version: 2
updates:

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore"
      include: "scope"

  # Python (uv-managed). Groups all updates into a single weekly PR
  # to keep noise down; security alerts still fire individually.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-deps:
        patterns: ["*"]
    commit-message:
      prefix: "chore"
      include: "scope"
