name: Tests

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - '**.py.tftpl'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'tests/**'
      - 'Makefile'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - '**.py'
      - '**.py.tftpl'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'tests/**'
      - 'Makefile'
      - '.github/workflows/test.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          python-version: '3.13'
          enable-cache: true

      - name: Install dependencies
        run: make install-dev

      - name: Run tests
        run: make test
