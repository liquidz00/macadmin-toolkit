name: Tests

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - '**.py.tftpl'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'tests/**'
      - 'Makefile'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - '**.py'
      - '**.py.tftpl'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'tests/**'
      - 'Makefile'
      - '.github/workflows/test.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: '3.13'
          enable-cache: true

      - name: Install dependencies
        run: make install-dev

      - name: Run tests
        run: make test
