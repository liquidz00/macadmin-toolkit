[project]
name = "common"
version = "0.1.0"
description = "Shared clients, models, and utilities for the macadmin-toolkit Python packages"
requires-python = ">=3.13"
dependencies = [
  "crowdstrike-falconpy>=1.4.0",
  "httpx>=0.27.0",
  "notion-client>=2.2.0",
  "pydantic>=2.7",
  "PyGithub>=2.4.0",
  "requests>=2.32.0",
  "slack-sdk>=3.33.0",
]

[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
